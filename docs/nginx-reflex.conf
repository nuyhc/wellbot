# 주의: 이 파일은 레포 내 참조용 사본이다. 실제 적용은 EC2 서버의 nginx
# 설정(/etc/nginx/sites-available/ 또는 conf.d/)에 반영 후 `nginx -t && nginx -s reload`.
# 동시 접속자 상한(worker_connections)과 파일 디스크립터(ulimit)는 이 server 블록이
# 아니라 메인 /etc/nginx/nginx.conf 의 events{} 블록과 systemd/limits 에서 설정한다:
#   events { worker_connections 4096; }
#   (systemd unit) LimitNOFILE=65535
server {
    listen 8501;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location ~ ^/(_event|ping|_upload|api/) {
        proxy_pass http://127.0.0.1:8000;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        client_max_body_size 60m;

        proxy_buffering off;
        proxy_request_buffering off;

        # 긴 LLM 스트리밍(thinking + tool loop)에서 토큰 사이 무전송 구간이
        # 기본 60s 를 넘으면 nginx 가 WebSocket/응답 연결을 끊는다. 확대 필수.
        proxy_read_timeout 600s;   # 업스트림(:8000) 무응답 허용 시간
        proxy_send_timeout 600s;   # 대용량 업로드 등 클라이언트로의 전송 지연 허용
    }
}
