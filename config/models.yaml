# max_tokens = thinking + response

models:
  - name: "Claude Sonnet 4.5"
    description: "일상적인 작업에 가장 효율적"
    provider: "bedrock"
    model_id: "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
    context_window: 200000
    max_tokens: 8192
    temperature: 0.5
    thinking: true
    thinking_budget: 4096
    supports_vision: true
    supports_document: true

  - name: "Claude Opus 4.6"
    description: "고난도 작업에 가장 강력함"
    provider: "bedrock"
    model_id: "global.anthropic.claude-opus-4-6-v1"
    context_window: 1000000
    max_tokens: 16384
    temperature: 0.4
    thinking: true
    thinking_budget: 8192      # 4.6 은 manual(budget_tokens) 허용(deprecated). adaptive 원하면 thinking_mode: adaptive + effort
    supports_vision: true
    supports_document: true

  - name: "Claude Opus 4.7"
    description: "고난도 작업에 강력함"
    provider: "bedrock"
    # 서울(ap-northeast-2)은 In-Region/Geo 미지원 → Global 프로파일 사용. 4.7 부터 -v1 접미사 없음.
    model_id: "global.anthropic.claude-opus-4-7"
    context_window: 1000000
    max_tokens: 32768          # adaptive thinking(high effort)은 thinking+응답을 함께 소비 → 여유 있게
    temperature: 0.4           # adaptive thinking 활성 시에는 전송 안 됨(비활성일 때만)
    thinking: true
    thinking_mode: "adaptive"  # 4.7 은 budget_tokens 미지원(400) → adaptive 필수
    effort: "high"             # 권장 기본값(= API 기본). 비용절감 medium / 심층 xhigh
    supports_vision: true
    supports_document: true

  - name: "Claude Opus 4.8"
    description: "고난도 작업에 가장 강력함 (최신)"
    provider: "bedrock"
    model_id: "global.anthropic.claude-opus-4-8"
    context_window: 1000000
    max_tokens: 32768
    temperature: 0.4
    thinking: true
    thinking_mode: "adaptive"  # 4.8 은 budget_tokens 미지원(400) → adaptive 필수
    effort: "high"
    supports_vision: true
    supports_document: true

  - name: "Amazon Nova Pro"
    description: "균형 잡힌 성능과 비용"
    provider: "bedrock"
    model_id: "apac.amazon.nova-pro-v1:0"
    context_window: 300000
    max_tokens: 4096
    temperature: 0.6
    top_p: 0.9
    supports_vision: true
    supports_document: true

  - name: "Amazon Nova Lite"
    description: "가장 빠른 답변"
    provider: "bedrock"
    model_id: "apac.amazon.nova-lite-v1:0"
    context_window: 300000
    max_tokens: 2048
    temperature: 0.6
    top_p: 0.9
    supports_vision: true
    supports_document: true

# 대화 제목 생성 (경량 모델)
title:
  model_id: "apac.amazon.nova-lite-v1:0"
  max_tokens: 30
  temperature: 0.3
  system_prompt: |
    대화의 첫 질문과 응답을 보고, 이 대화를 대표하는 짧은 제목을 한국어로 만들어주세요.15자 이내로, 제목만 출력하세요. 따옴표나 부가 설명 없이 제목 텍스트만 응답하세요.

# 임베딩 모델
embedding:
  model_id: "amazon.titan-embed-text-v2:0"
  dimension: 1024
