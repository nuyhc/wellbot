# KnowledgeBase 설정
# 인프라 자원(S3 버킷, Lambda ARN, IAM Role ARN)은 .env 의 KB_* 변수에서 주입됨.
# 이 파일에는 KB 동작 옵션(임베딩 모델, 폴링 주기, 폴더 매핑 등)만 둠.

personal_kb:
  embedding_model: "amazon.titan-embed-text-v2:0"
  kb_poll_interval: 5              # KB 생성 상태 확인 주기 (초)
  kb_poll_timeout: 120             # KB 생성 대기 최대 시간 (초)
  ingest_poll_interval: 5          # Ingestion 상태 확인 주기 (초)
  ingest_poll_timeout: 600         # Ingestion 대기 최대 시간 (초)

shared_kb:
  kb_id: ""                        # 공용 Bedrock KB ID (환경변수 KB_ID로도 설정 가능)
  embedding_model: "amazon.titan-embed-text-v2:0"
  poll_interval: 5                 # Ingestion 상태 확인 주기 (초)
  poll_timeout: 1800               # Ingestion 대기 최대 시간 (초) — 공용 KB는 대용량 가정
  # 폴더별 Data Source ID 매핑 (add-folder 실행 시 자동 추가)
  folders:
      사규: "9QQTRS4JPN"
  #   policy: "ds-xxxxxxxxxx"
  #   manual: "ds-xxxxxxxxxx"
  #   notice: "ds-xxxxxxxxxx"
