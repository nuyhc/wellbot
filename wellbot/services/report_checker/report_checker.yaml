# 보고서 오류 검출 서비스 전용 설정.
#
# 이 파일은 report_checker 모듈만 사용하며, 앱의 models.yaml/settings 와 독립적이다.
# 값 변경 시 앱 재시작 없이 다음 분석부터 반영된다(config 는 매 로드 시 파일을 읽음).

# ── 에이전트 식별자 ──
# 관리자 페이지에서 agnt_m 에 등록한 에이전트의 AGNT_ID 와 일치시킨다.
# 사용량 로그를 이 id 로 태깅해 모니터링에서 분리 집계한다.
agent_id: "RPT_INTEG_CHK"

# ── 모델 ──
# Bedrock Converse API 로 호출. inference profile id 를 사용한다.
model_id: "global.anthropic.claude-opus-4-8"
# region 미지정 시 AWS_REGION → AWS_DEFAULT_REGION → us-east-1 순으로 폴백.
region: ""
max_tokens: 8192          # JSON 잘림 방지를 위해 원본(4096) 대비 상향
# temperature 는 신형 모델(Opus 4.7/4.8 등)에서 폐기되어 전송 시 에러이므로 기본 미전송.
# 구형 모델 사용 시에만 0~1 값을 지정한다. null 이면 inferenceConfig 에 넣지 않음.
temperature: null

# ── 청크 크기 (페이지 단위) ──
typo_chunk_size: 10       # 오탈자 검사: 한 번에 검사할 페이지 수
extract_chunk_size: 20    # 사실 추출: 한 번에 처리할 페이지 수
validate_batch_size: 50   # 불일치 후보 검증: 한 배치의 항목 수

# ── 재시도 ──
max_retries: 3
retry_delay_sec: 3        # ThrottlingException 시 기본 대기(선형 증가)
call_interval_sec: 0.4    # 연속 호출 사이 최소 간격(스로틀 완화)

# ── 업로드 제한 ──
max_upload_mb: 50
allowed_extensions:
  - ".pdf"
