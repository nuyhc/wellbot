# report_maker 서비스 설정
#
# 리소스 식별자(memory_id 등 환경별 값)는 환경변수로 오버라이드 가능:
#   REPORT_MAKER_MODEL_ID, REPORT_MAKER_MEMORY_ID, AWS_REGION
# S3 버킷/prefix 는 앱 storage_service(환경변수 S3_KEY_PREFIX)를 재사용

agent_id: report-maker          # chtb_msg_d.AGNT_ID 태그 (메인 채팅과 분리)

# LLM
model_id: "global.anthropic.claude-sonnet-4-5-20250929-v1:0"
region: ""                      # 빈 값이면 기본 자격증명 체인/AWS_REGION 사용
read_timeout_sec: 300

# 토큰 예산 (호출 유형별)
max_tokens_outline: 50000       # 아웃라인 생성/수정
max_tokens_analysis: 30000      # 주제 분석·게이트 판정
max_tokens_style: 10000         # 문서 스타일 분석
max_tokens_vision: 2000         # 이미지 텍스트 추출

# AgentCore 메모리 (스타일 프로파일) — 환경변수 REPORT_MAKER_MEMORY_ID 우선
memory_id: ""

# 템플릿(보고서 유형)
max_templates: 5

# 업로드 (스타일 문서 + 주제 첨부)
max_upload_mb: 50
allowed_extensions:
  - .pdf
  - .pptx
  - .png
  - .jpg
  - .jpeg
  - .webp
  - .gif

# 호출 재시도
max_retries: 2
retry_base_delay_sec: 1.0
